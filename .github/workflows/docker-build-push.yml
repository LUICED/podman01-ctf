name: Build and Push CTF Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push day1-basic image
        uses: docker/build-push-action@v6
        with:
          context: ./day1-basic
          file: ./day1-basic/Dockerfile
          push: true
          tags: luvsannorovv/podman01:day1-basic
